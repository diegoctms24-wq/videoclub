<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HOME</title>
    <!-- Bootstrap -->
    <link href="{{url_for('static',filename='css/bt-min.css')}}" rel="stylesheet">
    <script src="{{url_for('static',filename='js/bt-bun.js')}}"></script>
    <link href="{{ url_for('static', filename='css/sign-in.css') }}" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{url_for('static',filename='css/estilos.css')}}" rel="stylesheet">
    <script src="{{url_for('static',filename='js/jquery.js')}}"></script>
    <script src="{{url_for('static',filename='js/funciones.js')}}"></script>
</head>
<body{% if show_navbar == false %} class="login-page"{% endif %}>
    <div class="container mt-3">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
    {% if show_navbar %}
    <nav class="navbar navbar-expand-lg bg-body-tertiary w-100 sticky-top shadow-sm" style="min-width:100vw;left:0;top:0;z-index:1030;">
        <div class="container-fluid p-0 m-0">
            <a class="navbar-brand" href="#">Videoclub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="/">Home</a>
                </li>
                <li class="nav-item">
                <a class="nav-link" href="/peliculas">Peliculas</a>
                </li>
                <li class="nav-item">
                <a class="nav-link" href="#">Privicing</a>
                </li>
                <li class="nav-item">
                <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                </li>
            </ul>
            </div>
        </div>
    </nav>
    {% endif %}
    {% block content %}
    {% endblock %}
</body>
</html>
