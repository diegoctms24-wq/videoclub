<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Videoclub</title>
    <!-- Bootstrap -->
    <link href="{{url_for('static',filename='css/bt-min.css')}}" rel="stylesheet">
    <script src="{{url_for('static',filename='js/bt-bun.js')}}"></script>
    <link href="{{ url_for('static', filename='css/sign-in.css') }}" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{url_for('static',filename='css/estilos.css')}}" rel="stylesheet">
    <script src="{{url_for('static',filename='js/jquery.js')}}"></script>
    <script src="{{url_for('static',filename='js/funciones.js')}}"></script>
</head>
<body{% if show_navbar == false %} class="login-page"{% endif %}>
    <div class="container mt-3">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
    {% if show_navbar %}
    <nav class="navbar navbar-expand-lg navbar-videoclub w-100 sticky-top shadow-sm" style="min-width:100vw;left:0;top:0;z-index:1030;">
        <div class="container-fluid px-3">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='img/videoclub-logo.svg') }}" alt="Videoclub" class="brand-logo">
                <span>Videoclub</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                <a class="nav-link {% if current_page == 'home' %}active{% endif %}" aria-current="page" href="{{ url_for('home') }}">Home</a>
                </li>
                <li class="nav-item">
                <a class="nav-link {% if current_page == 'peliculas' %}active{% endif %}" href="{{ url_for('peliculas_lista') }}">Peliculas</a>
                </li>
                <li class="nav-item">
                <a class="nav-link {% if current_page == 'acerca' %}active{% endif %}" href="{{ url_for('acerca_de') }}">Acerca de</a>
                </li>
                <li class="nav-item">
                <a class="nav-link {% if current_page == 'apoyar' %}active{% endif %}" href="{{ url_for('apoyar') }}">Apoyar</a>
                </li>
                <li class="nav-item nav-logout-item">
                <a class="nav-link nav-logout" href="{{ url_for('logout') }}">Cerrar sesion</a>
                </li>
            </ul>
            </div>
        </div>
    </nav>
    {% endif %}
    {% block content %}
    {% endblock %}
</body>
</html>
