{% extends "layout.html" %}
{% block content %}
<div class="login-center">
    <main class="form-signin w-100 m-auto">
        <form method="POST" action="/login">
            <!-- <img class="mb-4" src="{{ url_for('static', filename='img/bootstrap-logo.svg') }}" alt="" width="72" height="57"> -->
            <img class="mb-4" src="{{ url_for('static', filename='img/videoclub-logo.svg') }}" alt="" width="72" height="57">
            <h1 class="h3 mb-3 fw-normal">Iniciar</h1>
                <div class="form-floating"> <input type="text" class="form-control" id="floatingInput"
                    placeholder="Usuario" name="username" autocomplete="username"> <label for="floatingInput">Usuario</label> </div>
            <div class="form-floating"> <input type="password" class="form-control" id="floatingPassword"
                    placeholder="Password" name="password"> <label for="floatingPassword">Contraseña</label> </div>
            <div class="form-check text-start my-3"> <input class="form-check-input" type="checkbox" value="remember-me"
                    id="checkDefault"> <label class="form-check-label" for="checkDefault">
                    Recordarme
                </label> </div> <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
            <p class="mt-5 mb-3 text-body-secondary">&copy; 2017–2025</p>
        </form>
    </main>
</div>
{% endblock %}
